<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>ZEALWISH Web — Character workspace.</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="description" content="ZEALWISH Web is the browser workspace for creating, talking to, remembering, exporting, and carrying a wallet-owned AI character passport." />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='%230A0A0A'/%3E%3Cpath d='M10 12h12l5 23 8-23h10l8 23 5-23h6L52 52H40l-8-22-8 22H12z' fill='%23FF2D2D'/%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&family=Teko:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0A0A0A;
    --panel: rgba(12,12,12,0.92);
    --panel-soft: rgba(255,255,255,0.045);
    --red: #FF2D2D;
    --line-red: rgba(255,45,45,0.68);
    --line: rgba(255,255,255,0.12);
    --white: #FFFFFF;
    --muted: rgba(255,255,255,0.66);
    --faint: rgba(255,255,255,0.42);
  }
  * { box-sizing: border-box; }
  html { overflow-x: hidden; }
  body {
    margin: 0;
    min-height: 100vh;
    overflow-x: hidden;
    background:
      linear-gradient(rgba(255,255,255,0.026) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.026) 1px, transparent 1px),
      radial-gradient(circle at 84% 18%, rgba(255,45,45,0.24), transparent 30%),
      var(--black);
    background-size: 36px 36px, 36px 36px, auto, auto;
    color: var(--white);
    font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  a { color: inherit; text-decoration: none; }
  button, input, textarea { font: inherit; }
  button { cursor: pointer; }
  button:disabled { cursor: not-allowed; opacity: .48; }
  a:focus-visible, button:focus-visible, input:focus-visible, textarea:focus-visible {
    outline: 2px solid var(--red);
    outline-offset: 3px;
    box-shadow: 0 0 0 6px rgba(255,45,45,.18);
  }
  img { display: block; max-width: 100%; }
  #root { min-height: 100vh; }
  .mono { font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
  .display { font-family: Teko, Inter, sans-serif; letter-spacing: 0.03em; text-transform: uppercase; }
  .edge { clip-path: polygon(0 0, calc(100% - 18px) 0, 100% 18px, 100% 100%, 18px 100%, 0 calc(100% - 18px)); }
  .web-app-shell {
    min-height: 100vh;
    display: grid;
    grid-template-columns: 280px minmax(0, 1fr) 330px;
  }
  .app-sidebar {
    position: sticky;
    top: 0;
    height: 100vh;
    border-right: 1px solid var(--line-red);
    background: rgba(8,8,8,0.96);
    display: grid;
    grid-template-rows: auto 1fr auto;
  }
  .sidebar-brand { padding: 28px 24px 22px; border-bottom: 1px solid var(--line-red); }
  .sidebar-brand b { display: block; font-family: Teko, Inter, sans-serif; font-size: 54px; line-height: .82; letter-spacing: .03em; }
  .sidebar-brand span { display: block; margin-top: 12px; color: var(--red); font-size: 11px; letter-spacing: .18em; text-transform: uppercase; }
  .module-nav { display: grid; align-content: start; background: rgba(255,45,45,.52); gap: 1px; }
  .module-nav a {
    min-height: 86px;
    padding: 16px 20px;
    background: rgba(10,10,10,.97);
    transition: background 160ms ease, transform 160ms ease;
  }
  .module-nav a:hover, .module-nav a.is-active { background: var(--red); transform: translateX(4px); }
  .module-nav .code { display: block; font-size: 11px; opacity: .72; letter-spacing: .16em; }
  .module-nav b { display: block; margin-top: 8px; font-family: Teko, Inter, sans-serif; font-size: 34px; line-height: .82; text-transform: uppercase; }
  .module-nav small { display: block; margin-top: 7px; color: currentColor; opacity: .72; font-size: 10px; letter-spacing: .1em; text-transform: uppercase; }
  .sidebar-footer { padding: 18px 20px; color: var(--faint); font-size: 11px; line-height: 1.55; }
  .app-main { min-width: 0; display: grid; grid-template-rows: auto 1fr; }
  .app-topbar {
    position: sticky;
    top: 0;
    z-index: 5;
    min-height: 76px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 18px clamp(18px, 4vw, 46px);
    border-bottom: 1px solid rgba(255,45,45,.34);
    background: linear-gradient(180deg, rgba(10,10,10,.96), rgba(10,10,10,.78));
    backdrop-filter: blur(14px);
  }
  .crumb { color: var(--muted); font-size: 12px; letter-spacing: .16em; text-transform: uppercase; }
  .top-actions { display: flex; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }
  .button-primary, .button-secondary {
    min-height: 44px;
    border: 1px solid var(--red);
    border-radius: 0;
    padding: 0 16px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-weight: 850;
    letter-spacing: .12em;
    text-transform: uppercase;
  }
  .button-primary { background: var(--red); color: var(--white); box-shadow: 0 16px 42px rgba(255,45,45,.26); }
  .button-secondary { background: rgba(0,0,0,.28); color: var(--white); }
  .workspace { padding: clamp(18px, 3vw, 34px); }
  .app-inspector {
    position: sticky;
    top: 0;
    height: 100vh;
    border-left: 1px solid rgba(255,45,45,.34);
    background: rgba(7,7,7,.92);
    padding: 18px;
    display: grid;
    align-content: start;
    gap: 14px;
    overflow: auto;
  }
  .inspector-block {
    border: 1px solid rgba(255,45,45,.48);
    background: linear-gradient(180deg, rgba(255,45,45,.12), transparent 48%), rgba(12,12,12,.94);
    padding: 18px;
  }
  .inspector-block.compact { background: rgba(255,255,255,.045); }
  .inspector-block .code, .operating-queue .code { color: var(--red); font-size: 11px; letter-spacing: .18em; text-transform: uppercase; }
  .inspector-block h2 {
    margin: 12px 0 16px;
    font-family: Teko, Inter, sans-serif;
    font-size: 42px;
    line-height: .84;
    text-transform: uppercase;
  }
  .inspector-block p { margin: 10px 0; color: var(--muted); line-height: 1.55; }
  .inspector-block small { display: block; color: var(--faint); line-height: 1.55; }
  .integrity-list, .signal-row { display: grid; gap: 1px; background: rgba(255,45,45,.34); }
  .integrity-row, .signal-row {
    display: grid;
    gap: 8px;
    padding: 11px 12px;
    background: rgba(10,10,10,.9);
  }
  .integrity-row span, .signal-row span { color: var(--faint); font-size: 10px; letter-spacing: .14em; text-transform: uppercase; }
  .integrity-row strong, .signal-row b { color: var(--white); font-size: 12px; overflow-wrap: anywhere; }
  .page-title { max-width: 860px; margin-bottom: 18px; }
  .page-title .eyebrow { color: var(--red); font-size: 12px; letter-spacing: .18em; text-transform: uppercase; }
  .page-title h1 { margin: 10px 0 0; font-family: Teko, Inter, sans-serif; font-size: clamp(48px, 6vw, 88px); line-height: .82; text-transform: uppercase; }
  .page-title p { margin: 10px 0 0; max-width: 620px; color: var(--muted); font-size: 15px; line-height: 1.5; }
  .grid-two { display: grid; grid-template-columns: minmax(0, 1fr) minmax(320px, .78fr); gap: 16px; }
  .panel {
    min-width: 0;
    border: 1px solid var(--line-red);
    background: linear-gradient(180deg, rgba(255,45,45,.09), transparent 42%), rgba(9,9,9,.9);
    padding: clamp(18px, 2vw, 24px);
  }
  .panel .code { color: var(--red); font-size: 11px; letter-spacing: .18em; text-transform: uppercase; }
  .panel h2 { margin: 10px 0 12px; font-family: Teko, Inter, sans-serif; font-size: clamp(32px, 4vw, 52px); line-height: .84; text-transform: uppercase; }
  .panel p { color: var(--muted); line-height: 1.5; }
  .field-label { display: block; margin: 12px 0 8px; color: var(--faint); font-size: 11px; letter-spacing: .16em; text-transform: uppercase; }
  .field { width: 100%; border: 1px solid rgba(255,45,45,.56); background: rgba(0,0,0,.5); color: var(--white); outline: 0; padding: 13px 14px; border-radius: 0; }
  .field:focus { border-color: var(--red); box-shadow: 0 0 0 2px rgba(255,45,45,.18); }
  textarea.field { min-height: 104px; resize: vertical; }
  .workspace-dashboard { display: grid; gap: 18px; }
  .dashboard-header {
    display: flex;
    align-items: end;
    justify-content: space-between;
    gap: 20px;
    padding-bottom: 18px;
    border-bottom: 1px solid rgba(255,45,45,.3);
  }
  .dashboard-header .eyebrow { color: var(--red); font-size: 12px; letter-spacing: .18em; text-transform: uppercase; }
  .dashboard-header h1 {
    margin: 10px 0 0;
    font-family: Teko, Inter, sans-serif;
    font-size: clamp(58px, 8vw, 104px);
    line-height: .82;
    text-transform: uppercase;
  }
  .dashboard-header p { max-width: 720px; margin: 14px 0 0; color: var(--muted); line-height: 1.62; }
  .dashboard-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 1px;
    border: 1px solid rgba(255,45,45,.46);
    background: rgba(255,45,45,.46);
  }
  .dashboard-metric {
    min-height: 150px;
    padding: 18px;
    background: rgba(10,10,10,.96);
    display: grid;
    align-content: space-between;
    transition: transform 160ms ease, background 160ms ease;
  }
  .dashboard-metric:hover { transform: translateY(-3px); background: rgba(28,10,10,.96); }
  .dashboard-metric span { color: var(--red); font-size: 11px; letter-spacing: .16em; text-transform: uppercase; }
  .dashboard-metric strong { font-family: Teko, Inter, sans-serif; font-size: clamp(34px, 3.2vw, 42px); line-height: .86; overflow-wrap: break-word; word-break: normal; hyphens: none; }
  .dashboard-metric small { color: var(--faint); line-height: 1.45; }
  .dashboard-lower { display: grid; grid-template-columns: minmax(0, .95fr) minmax(340px, .7fr); gap: 16px; }
  .queue-list { display: grid; gap: 10px; }
  .queue-item {
    width: 100%;
    border: 1px solid rgba(255,255,255,.1);
    background: rgba(255,255,255,.045);
    color: var(--white);
    text-align: left;
    padding: 14px 16px;
    display: grid;
    grid-template-columns: 48px minmax(0, 1fr);
    gap: 4px 12px;
    transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
  }
  .queue-item:hover { transform: translateX(4px); border-color: rgba(255,45,45,.7); background: rgba(255,45,45,.13); }
  .queue-item span { grid-row: span 2; color: var(--red); font-size: 11px; letter-spacing: .14em; }
  .queue-item b { font-size: 16px; }
  .queue-item small { color: var(--faint); line-height: 1.45; }
  .passport-status-grid { display: grid; gap: 10px; }
  .passport-status-grid div { border-left: 2px solid var(--red); background: rgba(255,255,255,.045); padding: 12px 14px; }
  .passport-status-grid span { display: block; color: var(--faint); font-size: 10px; letter-spacing: .16em; text-transform: uppercase; }
  .passport-status-grid strong { display: block; margin-top: 6px; overflow-wrap: anywhere; }
  .dashboard-actions { display: grid; gap: 10px; margin-top: 18px; }
  .stat-grid, .route-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 1px; background: rgba(255,45,45,.48); border: 1px solid rgba(255,45,45,.48); }
  .stat, .route-card { min-height: 168px; padding: 18px; background: rgba(10,10,10,.95); }
  .route-card { display: grid; align-content: start; gap: 12px; }
  .route-card button { width: 100%; margin-top: 4px; min-height: 40px; padding: 0 12px; font-size: 12px; letter-spacing: .1em; }
  .stat strong { display: block; margin-top: 24px; font-family: Teko, Inter, sans-serif; font-size: 38px; line-height: .86; }
  .stat span, .route-card span { color: var(--red); font-size: 11px; letter-spacing: .16em; text-transform: uppercase; }
  .route-card b { display: block; margin-top: 26px; font-size: 20px; }
  .route-card p { font-size: 13px; }
  .passport-preview { display: grid; align-content: end; min-height: 420px; }
  .passport-preview img { width: min(260px, 68%); justify-self: center; margin-bottom: 14px; filter: drop-shadow(0 24px 42px rgba(0,0,0,.72)); }
  .chat-panel { min-height: 420px; display: grid; grid-template-rows: auto auto minmax(190px, 1fr) auto; }
  .chat-log { display: grid; gap: 12px; align-content: start; overflow: auto; max-height: 240px; padding-right: 6px; }
  .message { max-width: min(720px, 92%); border: 1px solid var(--line); background: var(--panel-soft); padding: 13px 14px; }
  .message.user { margin-left: auto; border-color: rgba(255,45,45,.66); background: rgba(255,45,45,.14); }
  .message b { display: block; margin-bottom: 6px; color: var(--red); font-size: 11px; letter-spacing: .12em; text-transform: uppercase; }
  .message span { color: rgba(255,255,255,.86); line-height: 1.55; }
  .chat-input { display: grid; grid-template-columns: minmax(0, 1fr) 132px; gap: 10px; margin-top: 18px; }
  .memory-stack { display: grid; gap: 10px; }
  .memory-item { border-left: 2px solid var(--red); padding: 12px 14px; background: rgba(255,255,255,.045); line-height: 1.5; }
  .timeline { display: grid; border: 1px solid var(--line-red); }
  .timeline-row { display: grid; grid-template-columns: 120px minmax(0, 1fr) 96px 190px; gap: 18px; padding: 18px; border-bottom: 1px solid rgba(255,45,45,.28); align-items: center; }
  .timeline-row:last-child { border-bottom: 0; }
  .timeline-row time, .timeline-row span { color: var(--red); font-size: 11px; letter-spacing: .12em; text-transform: uppercase; }
  .timeline-row button { min-height: 38px; padding: 0 12px; }
  .settings-grid { display: grid; grid-template-columns: minmax(0, .8fr) minmax(360px, 1fr); gap: 16px; align-items: start; }
  .settings-stack { display: grid; gap: 16px; }
  .settings-export { min-height: 100%; }
  .status-ledger, .storage-ledger {
    display: grid;
    gap: 1px;
    background: rgba(255,45,45,.36);
    border: 1px solid rgba(255,45,45,.36);
  }
  .status-row, .storage-row {
    display: grid;
    grid-template-columns: minmax(120px, .45fr) minmax(0, 1fr);
    gap: 12px;
    padding: 13px 14px;
    background: rgba(10,10,10,.94);
    align-items: center;
  }
  .status-row span, .storage-row span { color: var(--faint); font-size: 10px; letter-spacing: .16em; text-transform: uppercase; }
  .status-row strong, .storage-row strong { color: var(--white); overflow-wrap: anywhere; }
  .settings-actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 18px; }
  .action-status, .copy-status { min-height: 20px; margin-top: 12px; color: var(--muted); font-size: 12px; letter-spacing: .08em; text-transform: uppercase; }
  .export-box { max-height: 360px; overflow: auto; border: 1px solid rgba(255,45,45,.44); background: rgba(0,0,0,.62); padding: 14px; color: rgba(255,255,255,.82); font: 12px/1.5 "JetBrains Mono", ui-monospace, monospace; white-space: pre-wrap; }
  .error { color: #ff8a8a; }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      scroll-behavior: auto !important;
      transition-duration: 0.01ms !important;
    }
  }
  @media (max-width: 1240px) {
    .web-app-shell { grid-template-columns: 250px minmax(0, 1fr); }
    .app-inspector { position: static; height: auto; grid-column: 1 / -1; border-left: 0; border-top: 1px solid rgba(255,45,45,.34); grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .settings-grid { grid-template-columns: 1fr; }
  }
  @media (max-width: 820px) {
    .web-app-shell { grid-template-columns: 1fr; }
    .web-app-shell, .app-sidebar, .app-main, .app-topbar, .workspace { width: 100%; max-width: 100vw; }
    .app-sidebar { position: sticky; top: 0; z-index: 10; height: auto; display: block; border-right: 0; border-bottom: 1px solid var(--line-red); }
    .sidebar-brand { padding: 14px 18px 12px; }
    .sidebar-brand b { font-size: 34px; }
    .sidebar-brand span { margin-top: 6px; font-size: 10px; }
    .sidebar-footer { display: none; }
    .module-nav { display: flex; overflow-x: auto; align-content: initial; width: 100%; max-width: 100vw; scroll-snap-type: x mandatory; }
    .module-nav a { flex: 0 0 136px; min-height: 74px; padding: 12px 14px; scroll-snap-align: start; }
    .module-nav a:hover, .module-nav a.is-active { transform: none; }
    .module-nav b { font-size: 26px; }
    .app-topbar { position: sticky; top: 122px; }
    .app-inspector { display: none; }
    .workspace { padding: 22px 18px 34px; }
    .page-title h1 { font-size: clamp(44px, 15vw, 72px); }
    .dashboard-header h1 { font-size: clamp(44px, 15vw, 72px); }
    .grid-two, .stat-grid, .route-grid, .dashboard-grid, .dashboard-lower, .settings-grid { grid-template-columns: 1fr; }
    .timeline-row { grid-template-columns: 1fr; gap: 6px; }
    .settings-export { order: -1; }
  }
  @media (max-width: 560px) {
    .app-topbar { align-items: flex-start; flex-direction: column; }
    .dashboard-header { align-items: stretch; flex-direction: column; }
    .chat-input { grid-template-columns: 1fr; }
    .button-primary, .button-secondary { width: 100%; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="src/v4/wallet-service.jsx"></script>
<script src="src/v6/zealwish-web-app.js?v=20260611-api"></script>
</body>
</html>
